<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/spider_logo_3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outfy-store</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const SIZE = 64;
        const ZOOM = 1.4; // zoom level — increase to zoom in more
        const canvas = document.createElement("canvas");
        canvas.width = SIZE;
        canvas.height = SIZE;
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.src = "/spider_logo_3.png";

        img.onload = function () {
          const drawSize = SIZE * ZOOM;
          const offset = (SIZE - drawSize) / 2;
          ctx.drawImage(img, offset, offset, drawSize, drawSize);
          document.getElementById("favicon").href =
            canvas.toDataURL("image/png");
        };
      })();
    </script>
  </body>
</html>
